<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ragnos API Test - SPA para verificar el modo API de controladores Ragnos">
    <title>Ragnos API Test</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="app.css">
</head>

<body x-data="app()" x-init="init()">

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- LOGIN SCREEN -->
    <!-- ═══════════════════════════════════════════════════ -->
    <template x-if="!isAuthenticated">
        <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
            <div class="login-card">
                <div class="login-card-header text-center">
                    <div class="login-logo mb-3">
                        <i class="bi bi-braces-asterisk"></i>
                    </div>
                    <h1 class="login-title">Ragnos <span class="text-accent">API</span> Test</h1>
                    <p class="login-subtitle">Verificación del modo API de controladores</p>
                </div>

                <div class="login-card-body">
                    <!-- Login Error -->
                    <template x-if="loginError">
                        <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center"
                            role="alert">
                            <i class="bi bi-shield-exclamation me-2"></i>
                            <span x-text="loginError"></span>
                            <button type="button" class="btn-close" @click="loginError = ''"></button>
                        </div>
                    </template>

                    <form @submit.prevent="login()" id="login-form">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="login-usuario" placeholder="Usuario"
                                x-model="loginForm.usuario" required autocomplete="username">
                            <label for="login-usuario"><i class="bi bi-person me-1"></i> Usuario</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="login-password" placeholder="Contraseña"
                                x-model="loginForm.pword" required autocomplete="current-password">
                            <label for="login-password"><i class="bi bi-lock me-1"></i> Contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 btn-lg" :disabled="loginLoading"
                            id="login-submit-btn">
                            <span x-show="!loginLoading"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar
                                Sesión</span>
                            <span x-show="loginLoading">
                                <span class="spinner-border spinner-border-sm me-2"></span>Autenticando...
                            </span>
                        </button>
                    </form>
                </div>

                <div class="login-card-footer text-center d-flex justify-content-between align-items-center">
                    <button type="button" class="btn btn-sm btn-ghost" @click="toggleTheme()" :title="appTheme === 'dark' ? 'Modo Claro' : 'Modo Oscuro'">
                        <i class="bi" :class="appTheme === 'dark' ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
                    </button>
                    <small class="text-muted">Ragnos Framework v1.1 — Modo API</small>
                    <div style="width: 30px;"></div><!-- Spacer for centering -->
                </div>
            </div>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- MAIN APP (Authenticated) -->
    <!-- ═══════════════════════════════════════════════════ -->
    <template x-if="isAuthenticated">
        <div class="app-layout">
            <!-- SIDEBAR -->
            <aside class="app-sidebar" :class="{ 'collapsed': sidebarCollapsed }">
                <div class="sidebar-brand">
                    <i class="bi bi-braces-asterisk brand-icon"></i>
                    <span class="brand-text" x-show="!sidebarCollapsed">Ragnos API</span>
                </div>

                <nav class="sidebar-nav">
                    <div class="nav-section-title" x-show="!sidebarCollapsed">PRINCIPAL</div>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'dashboard' }"
                        @click.prevent="switchModule('dashboard')" id="nav-dashboard">
                        <i class="bi bi-grid-1x2-fill"></i>
                        <span x-show="!sidebarCollapsed">Dashboard</span>
                    </a>

                    <div class="nav-section-title" x-show="!sidebarCollapsed">OPERACIONES</div>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'pagos' }"
                        @click.prevent="switchModule('pagos')" id="nav-pagos">
                        <i class="bi bi-credit-card-2-front-fill"></i>
                        <span x-show="!sidebarCollapsed">Pagos</span>
                    </a>

                    <div class="nav-section-title" x-show="!sidebarCollapsed">CATÁLOGOS</div>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'clientes' }"
                        @click.prevent="switchModule('clientes')" id="nav-clientes">
                        <i class="bi bi-people-fill"></i>
                        <span x-show="!sidebarCollapsed">Clientes</span>
                    </a>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'productos' }"
                        @click.prevent="switchModule('productos')" id="nav-productos">
                        <i class="bi bi-box-seam-fill"></i>
                        <span x-show="!sidebarCollapsed">Productos</span>
                    </a>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'empleados' }"
                        @click.prevent="switchModule('empleados')" id="nav-empleados">
                        <i class="bi bi-person-badge-fill"></i>
                        <span x-show="!sidebarCollapsed">Empleados</span>
                    </a>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'oficinas' }"
                        @click.prevent="switchModule('oficinas')" id="nav-oficinas">
                        <i class="bi bi-building-fill"></i>
                        <span x-show="!sidebarCollapsed">Oficinas</span>
                    </a>
                    <a href="#" class="nav-link-item" :class="{ 'active': currentModule === 'lineas' }"
                        @click.prevent="switchModule('lineas')" id="nav-lineas">
                        <i class="bi bi-tags-fill"></i>
                        <span x-show="!sidebarCollapsed">Líneas</span>
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <button class="btn btn-sm btn-outline-secondary w-100" @click="sidebarCollapsed = !sidebarCollapsed"
                        id="sidebar-toggle">
                        <i class="bi" :class="sidebarCollapsed ? 'bi-chevron-right' : 'bi-chevron-left'"></i>
                    </button>
                </div>
            </aside>

            <!-- MAIN CONTENT AREA -->
            <div class="app-main">
                <!-- TOP NAV BAR -->
                <header class="app-topbar">
                    <div class="topbar-left">
                        <button class="btn btn-sm btn-ghost d-lg-none" @click="sidebarCollapsed = !sidebarCollapsed">
                            <i class="bi bi-list fs-5"></i>
                        </button>
                        <nav class="breadcrumb-nav ms-2">
                            <span class="breadcrumb-item text-muted">API Test</span>
                            <i class="bi bi-chevron-right mx-1 text-muted"></i>
                            <span class="breadcrumb-item active" x-text="moduleTitle"></span>
                        </nav>
                    </div>
                    <div class="topbar-right">
                        <div class="user-chip" id="user-chip">
                            <div class="user-avatar">
                                <i class="bi bi-person-circle"></i>
                            </div>
                            <span class="user-name" x-text="'User #' + userId"></span>
                            <button class="btn btn-sm btn-ghost ms-2" @click="toggleTheme()" :title="appTheme === 'dark' ? 'Modo Claro' : 'Modo Oscuro'">
                                <i class="bi" :class="appTheme === 'dark' ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger ms-1" @click="logout()" id="logout-btn"
                                title="Cerrar sesión">
                                <i class="bi bi-box-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </header>

                <!-- CONTENT -->
                <main class="app-content">

                    <!-- ═══ DASHBOARD ═══ -->
                    <template x-if="currentModule === 'dashboard'">
                        <div class="fade-in">
                            <div class="module-header">
                                <h2><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</h2>
                                <p class="text-muted">Panel de control — Ragnos API Test SPA</p>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6 col-xl-3">
                                    <div class="stat-card stat-card-purple" @click="switchModule('pagos')">
                                        <div class="stat-icon"><i class="bi bi-credit-card-2-front-fill"></i></div>
                                        <div class="stat-info">
                                            <div class="stat-label">Pagos</div>
                                            <div class="stat-value">Gestionar</div>
                                        </div>
                                        <i class="bi bi-arrow-right stat-arrow"></i>
                                    </div>
                                </div>
                                <div class="col-md-6 col-xl-3">
                                    <div class="stat-card stat-card-blue" @click="switchModule('clientes')">
                                        <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
                                        <div class="stat-info">
                                            <div class="stat-label">Clientes</div>
                                            <div class="stat-value">Catálogo</div>
                                        </div>
                                        <i class="bi bi-arrow-right stat-arrow"></i>
                                    </div>
                                </div>
                                <div class="col-md-6 col-xl-3">
                                    <div class="stat-card stat-card-green" @click="switchModule('productos')">
                                        <div class="stat-icon"><i class="bi bi-box-seam-fill"></i></div>
                                        <div class="stat-info">
                                            <div class="stat-label">Productos</div>
                                            <div class="stat-value">Catálogo</div>
                                        </div>
                                        <i class="bi bi-arrow-right stat-arrow"></i>
                                    </div>
                                </div>
                                <div class="col-md-6 col-xl-3">
                                    <div class="stat-card stat-card-amber" @click="switchModule('empleados')">
                                        <div class="stat-icon"><i class="bi bi-person-badge-fill"></i></div>
                                        <div class="stat-info">
                                            <div class="stat-label">Empleados</div>
                                            <div class="stat-value">Catálogo</div>
                                        </div>
                                        <i class="bi bi-arrow-right stat-arrow"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="card glass-card">
                                <div class="card-body">
                                    <h5 class="card-title"><i class="bi bi-info-circle me-2"></i>Acerca de esta
                                        aplicación</h5>
                                    <p class="card-text text-muted">
                                        Esta SPA utiliza <strong>AlpineJS</strong> y <strong>Bootstrap 5</strong> para
                                        consumir la API REST de
                                        <strong>Ragnos Framework</strong>. Puedes probar operaciones CRUD, paginación,
                                        búsqueda y manejo de errores de validación en cada módulo.
                                    </p>
                                    <div class="row mt-3">
                                        <div class="col-md-4">
                                            <div class="feature-item">
                                                <i class="bi bi-shield-check text-success"></i>
                                                <span>Autenticación por Token</span>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="feature-item">
                                                <i class="bi bi-arrow-repeat text-info"></i>
                                                <span>CRUD Completo</span>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="feature-item">
                                                <i class="bi bi-exclamation-triangle text-warning"></i>
                                                <span>Manejo de Errores</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ═══ PAGOS MODULE ═══ -->
                    <template x-if="currentModule === 'pagos'">
                        <div x-data="pagosModule()" x-init="loadData()" class="fade-in">
                            <div class="module-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <div>
                                    <h2><i class="bi bi-credit-card-2-front-fill me-2"></i>Pagos</h2>
                                    <p class="text-muted mb-0">Registrar y capturar pagos</p>
                                </div>
                                <button class="btn btn-accent" @click="openForm()" id="pagos-new-btn">
                                    <i class="bi bi-plus-lg me-1"></i> Nuevo Pago
                                </button>
                            </div>

                            <!-- Search & Filter Bar -->
                            <div class="filter-bar mb-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control" placeholder="Buscar pagos..."
                                        x-model="searchTerm" @input.debounce.400ms="loadData()" id="pagos-search">
                                    <button class="btn btn-outline-secondary" @click="searchTerm=''; loadData()"
                                        x-show="searchTerm">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Loading -->
                            <template x-if="loading">
                                <div class="text-center py-5">
                                    <div class="spinner-border text-accent" role="status"></div>
                                    <p class="mt-2 text-muted">Cargando datos...</p>
                                </div>
                            </template>

                            <!-- Data Table -->
                            <template x-if="!loading">
                                <div>
                                    <div class="table-responsive">
                                        <table class="table table-hover table-modern" id="pagos-table">
                                            <thead>
                                                <tr>
                                                    <th>Cliente</th>
                                                    <th>Nº Cheque</th>
                                                    <th>Fecha de Pago</th>
                                                    <th class="text-end">Monto</th>
                                                    <th class="text-center" style="width:120px">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="row in rows" :key="row.idPayment || row.id">
                                                    <tr class="table-row-animated">
                                                        <td x-text="row.customerName || row.customerNumber"></td>
                                                        <td><code x-text="row.checkNumber"></code></td>
                                                        <td x-text="row.paymentDate"></td>
                                                        <td class="text-end fw-semibold"
                                                            x-text="formatMoney(row.amount)"></td>
                                                        <td class="text-center">
                                                            <button class="btn btn-sm btn-outline-info me-1"
                                                                @click="editRow(row)" title="Editar">
                                                                <i class="bi bi-pencil-square"></i>
                                                            </button>
                                                            <button class="btn btn-sm btn-outline-danger"
                                                                @click="confirmDelete(row)" title="Eliminar">
                                                                <i class="bi bi-trash3"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                </template>
                                                <template x-if="rows.length === 0">
                                                    <tr>
                                                        <td colspan="5" class="text-center text-muted py-4">
                                                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                                            No se encontraron registros
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- Pagination -->
                                    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
                                        <small class="text-muted">
                                            Mostrando <span x-text="rows.length"></span> de <span
                                                x-text="totalRecords"></span> registros
                                            — Página <span x-text="currentPage"></span> de <span
                                                x-text="totalPages"></span>
                                        </small>
                                        <nav>
                                            <ul class="pagination pagination-sm mb-0">
                                                <li class="page-item" :class="{ 'disabled': currentPage <= 1 }">
                                                    <a class="page-link" href="#"
                                                        @click.prevent="goToPage(currentPage - 1)">
                                                        <i class="bi bi-chevron-left"></i>
                                                    </a>
                                                </li>
                                                <template x-for="p in paginationPages()" :key="'pag-'+p">
                                                    <li class="page-item" :class="{ 'active': p === currentPage }">
                                                        <a class="page-link" href="#" x-text="p"
                                                            @click.prevent="goToPage(p)"></a>
                                                    </li>
                                                </template>
                                                <li class="page-item"
                                                    :class="{ 'disabled': currentPage >= totalPages }">
                                                    <a class="page-link" href="#"
                                                        @click.prevent="goToPage(currentPage + 1)">
                                                        <i class="bi bi-chevron-right"></i>
                                                    </a>
                                                </li>
                                            </ul>
                                        </nav>
                                    </div>
                                </div>
                            </template>

                            <!-- FORM MODAL -->
                            <div class="modal fade" id="pagosModal" tabindex="-1" data-bs-backdrop="static">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content glass-card">
                                        <div class="modal-header border-0">
                                            <h5 class="modal-title">
                                                <i class="bi bi-credit-card-2-front me-2"></i>
                                                <span x-text="formMode === 'create' ? 'Nuevo Pago' : 'Editar Pago'">
                                                </span>
                                            </h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <!-- Validation Errors -->
                                            <template x-if="Object.keys(formErrors).length > 0">
                                                <div class="alert alert-danger">
                                                    <h6 class="alert-heading"><i
                                                            class="bi bi-exclamation-triangle me-1"></i>Errores de
                                                        Validación</h6>
                                                    <ul class="mb-0 small">
                                                        <template x-for="(msg, field) in formErrors"
                                                            :key="'err-'+field">
                                                            <li><strong x-text="field + ': '"></strong><span
                                                                    x-text="msg"></span></li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>

                                            <form @submit.prevent="saveForm()" id="pagos-form">
                                                <!-- Customer Number with Search -->
                                                <div class="mb-3">
                                                    <label class="form-label">Cliente <span
                                                            class="text-danger">*</span></label>
                                                    <div class="input-group">
                                                        <input type="text" class="form-control"
                                                            x-model="form.customerNumber" required
                                                            :class="{ 'is-invalid': formErrors.customerNumber }"
                                                            id="pagos-customer-input" readonly>
                                                        <button class="btn btn-outline-accent" type="button"
                                                            @click="openCustomerSearch()"
                                                            id="pagos-customer-search-btn">
                                                            <i class="bi bi-search"></i>
                                                        </button>
                                                    </div>
                                                    <small class="text-muted" x-text="customerLabel"
                                                        x-show="customerLabel"></small>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Número de Cheque <span
                                                            class="text-danger">*</span></label>
                                                    <input type="text" class="form-control"
                                                        x-model="form.checkNumber" required
                                                        :class="{ 'is-invalid': formErrors.checkNumber }"
                                                        id="pagos-check-input">
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Fecha de Pago <span
                                                            class="text-danger">*</span></label>
                                                    <input type="date" class="form-control"
                                                        x-model="form.paymentDate" required
                                                        :class="{ 'is-invalid': formErrors.paymentDate }"
                                                        id="pagos-date-input">
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Monto <span
                                                            class="text-danger">*</span></label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="text" class="form-control"
                                                            x-model="form.amount" required
                                                            :class="{ 'is-invalid': formErrors.amount }"
                                                            id="pagos-amount-input" placeholder="0.00">
                                                    </div>
                                                </div>

                                                <div class="d-flex justify-content-end gap-2 mt-4">
                                                    <button type="button" class="btn btn-outline-secondary"
                                                        data-bs-dismiss="modal">
                                                        <i class="bi bi-x-lg me-1"></i>Cancelar
                                                    </button>
                                                    <button type="submit" class="btn btn-accent" :disabled="saving"
                                                        id="pagos-save-btn">
                                                        <span x-show="!saving"><i
                                                                class="bi bi-check-lg me-1"></i>Guardar</span>
                                                        <span x-show="saving"><span
                                                                class="spinner-border spinner-border-sm me-1"></span>Guardando...</span>
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- CUSTOMER SEARCH MODAL -->
                            <div class="modal fade" id="customerSearchModal" tabindex="-1">
                                <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                                    <div class="modal-content glass-card">
                                        <div class="modal-header border-0">
                                            <h5 class="modal-title"><i class="bi bi-people me-2"></i>Buscar Cliente
                                            </h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <div class="input-group mb-3">
                                                <span class="input-group-text"><i class="bi bi-search"></i></span>
                                                <input type="text" class="form-control"
                                                    placeholder="Buscar por nombre, contacto, empleado..."
                                                    x-model="customerSearchTerm"
                                                    @input.debounce.400ms="searchCustomers()"
                                                    id="customer-search-input">
                                            </div>

                                            <template x-if="customerSearchLoading">
                                                <div class="text-center py-4">
                                                    <div class="spinner-border spinner-border-sm text-accent"></div>
                                                </div>
                                            </template>

                                            <div class="list-group list-group-flush"
                                                x-show="!customerSearchLoading">
                                                <template x-for="c in customerSearchResults"
                                                    :key="c.customerNumber || c.id">
                                                    <button type="button"
                                                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                                                        @click="selectCustomer(c)">
                                                        <div>
                                                            <strong
                                                                x-text="c.customerName || c.customerNumber"></strong>
                                                            <br>
                                                            <small class="text-muted"
                                                                x-text="'#' + (c.customerNumber || c.id)"></small>
                                                        </div>
                                                        <i class="bi bi-check-circle text-success"></i>
                                                    </button>
                                                </template>
                                                <template
                                                    x-if="!customerSearchLoading && customerSearchResults.length === 0">
                                                    <div class="text-center text-muted py-3">
                                                        <i class="bi bi-search fs-4 d-block mb-1"></i>
                                                        Sin resultados
                                                    </div>
                                                </template>
                                            </div>

                                            <!-- Customer Search Pagination -->
                                            <div class="d-flex justify-content-between align-items-center mt-3"
                                                x-show="customerTotalPages > 1">
                                                <small class="text-muted">Página <span
                                                        x-text="customerCurrentPage"></span> de <span
                                                        x-text="customerTotalPages"></span></small>
                                                <nav>
                                                    <ul class="pagination pagination-sm mb-0">
                                                        <li class="page-item"
                                                            :class="{ 'disabled': customerCurrentPage <= 1 }">
                                                            <a class="page-link" href="#"
                                                                @click.prevent="customerGoToPage(customerCurrentPage - 1)">
                                                                <i class="bi bi-chevron-left"></i>
                                                            </a>
                                                        </li>
                                                        <template x-for="p in customerPaginationPages()"
                                                            :key="'cpag-'+p">
                                                            <li class="page-item"
                                                                :class="{ 'active': p === customerCurrentPage }">
                                                                <a class="page-link" href="#" x-text="p"
                                                                    @click.prevent="customerGoToPage(p)"></a>
                                                            </li>
                                                        </template>
                                                        <li class="page-item"
                                                            :class="{ 'disabled': customerCurrentPage >= customerTotalPages }">
                                                            <a class="page-link" href="#"
                                                                @click.prevent="customerGoToPage(customerCurrentPage + 1)">
                                                                <i class="bi bi-chevron-right"></i>
                                                            </a>
                                                        </li>
                                                    </ul>
                                                </nav>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- DELETE CONFIRM MODAL -->
                            <div class="modal fade" id="deleteModal" tabindex="-1">
                                <div class="modal-dialog modal-dialog-centered modal-sm">
                                    <div class="modal-content glass-card">
                                        <div class="modal-header border-0">
                                            <h5 class="modal-title text-danger"><i
                                                    class="bi bi-exclamation-triangle me-2"></i>Confirmar</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body text-center">
                                            <p>¿Estás seguro de eliminar este pago?</p>
                                            <small class="text-muted" x-text="'Cheque: ' + deleteTarget?.checkNumber">
                                            </small>
                                        </div>
                                        <div class="modal-footer border-0 justify-content-center">
                                            <button class="btn btn-outline-secondary btn-sm"
                                                data-bs-dismiss="modal">Cancelar</button>
                                            <button class="btn btn-danger btn-sm" @click="deleteRow()"
                                                :disabled="deleting" id="confirm-delete-btn">
                                                <span x-show="!deleting"><i
                                                        class="bi bi-trash3 me-1"></i>Eliminar</span>
                                                <span x-show="deleting"><span
                                                        class="spinner-border spinner-border-sm me-1"></span>...</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ═══ GENERIC CATALOG MODULE ═══ -->
                    <template
                        x-if="['clientes','productos','empleados','oficinas','lineas'].includes(currentModule)">
                        <div x-data="catalogModule()" x-init="init(); loadCatalog()" class="fade-in"
                            :key="'catalog-' + $store.app.currentModule">
                            <div
                                class="module-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <div>
                                    <h2>
                                        <i class="bi me-2" :class="catalogIcon()"></i>
                                        <span x-text="catalogTitle()"></span>
                                    </h2>
                                    <p class="text-muted mb-0" x-text="'Catálogo de ' + catalogTitle().toLowerCase()">
                                    </p>
                                </div>
                            </div>

                            <!-- Search Bar -->
                            <div class="filter-bar mb-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control"
                                        :placeholder="'Buscar ' + catalogTitle().toLowerCase() + '...'"
                                        x-model="searchTerm" @input.debounce.400ms="loadCatalog()"
                                        :id="currentModule + '-search'">
                                    <button class="btn btn-outline-secondary"
                                        @click="searchTerm=''; loadCatalog()" x-show="searchTerm">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Loading -->
                            <template x-if="loading">
                                <div class="text-center py-5">
                                    <div class="spinner-border text-accent"></div>
                                    <p class="mt-2 text-muted">Cargando datos...</p>
                                </div>
                            </template>

                            <!-- Error -->
                            <template x-if="error">
                                <div class="alert alert-danger">
                                    <i class="bi bi-exclamation-triangle me-2"></i>
                                    <span x-text="error"></span>
                                </div>
                            </template>

                            <!-- Data Table -->
                            <template x-if="!loading && !error">
                                <div>
                                    <div class="table-responsive">
                                        <table class="table table-hover table-modern"
                                            :id="currentModule + '-table'">
                                            <thead>
                                                <tr>
                                                    <template x-for="col in columns" :key="'col-'+col">
                                                        <th x-text="col"></th>
                                                    </template>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="(row, ri) in rows" :key="'row-'+ri">
                                                    <tr class="table-row-animated">
                                                        <template x-for="col in columns"
                                                            :key="'cell-'+ri+'-'+col">
                                                            <td x-text="row[col] ?? ''"></td>
                                                        </template>
                                                    </tr>
                                                </template>
                                                <template x-if="rows.length === 0">
                                                    <tr>
                                                        <td :colspan="columns.length"
                                                            class="text-center text-muted py-4">
                                                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                                            No se encontraron registros
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- Pagination -->
                                    <div
                                        class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
                                        <small class="text-muted">
                                            Mostrando <span x-text="rows.length"></span> de <span
                                                x-text="totalRecords"></span> registros
                                            — Página <span x-text="currentPage"></span> de <span
                                                x-text="totalPages"></span>
                                        </small>
                                        <nav x-show="totalPages > 1">
                                            <ul class="pagination pagination-sm mb-0">
                                                <li class="page-item"
                                                    :class="{ 'disabled': currentPage <= 1 }">
                                                    <a class="page-link" href="#"
                                                        @click.prevent="goToPage(currentPage - 1)">
                                                        <i class="bi bi-chevron-left"></i>
                                                    </a>
                                                </li>
                                                <template x-for="p in paginationPages()" :key="'cpag-'+p">
                                                    <li class="page-item"
                                                        :class="{ 'active': p === currentPage }">
                                                        <a class="page-link" href="#" x-text="p"
                                                            @click.prevent="goToPage(p)"></a>
                                                    </li>
                                                </template>
                                                <li class="page-item"
                                                    :class="{ 'disabled': currentPage >= totalPages }">
                                                    <a class="page-link" href="#"
                                                        @click.prevent="goToPage(currentPage + 1)">
                                                        <i class="bi bi-chevron-right"></i>
                                                    </a>
                                                </li>
                                            </ul>
                                        </nav>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                </main>
            </div>
        </div>
    </template>

    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-area">
        <template x-for="(t, ti) in toasts" :key="'toast-'+ti">
            <div class="toast show glass-toast" :class="'toast-' + t.type" role="alert">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi" :class="{
                        'bi-check-circle-fill text-success': t.type === 'success',
                        'bi-exclamation-triangle-fill text-danger': t.type === 'error',
                        'bi-info-circle-fill text-info': t.type === 'info'
                    }"></i>
                    <span x-text="t.message"></span>
                    <button type="button" class="btn-close btn-close-white ms-auto btn-sm"
                        @click="removeToast(ti)"></button>
                </div>
            </div>
        </template>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
